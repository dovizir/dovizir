# dash: import Figma styles as a brand source (custody-free). v3
# Dispatched by dash; runs with YOUR FIGMA_TOKEN secret — dash never sees it.
name: dash-figma-import
on:
  workflow_dispatch:
    inputs:
      figma_url:
        description: "Figma file link"
        required: true
permissions:
  contents: write
jobs:
  import:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deep-dig styles from Figma
        env:
          FIGMA_TOKEN: ${{ secrets.FIGMA_TOKEN }}
          FIGMA_URL: ${{ inputs.figma_url }}
        run: |
          if [ -z "$FIGMA_TOKEN" ]; then
            echo "::error::FIGMA_TOKEN secret is not set — add it in dash's Vault, then re-run."
            exit 1
          fi
          cat > /tmp/figma-import.mjs <<'SCRIPT'
          const url = process.env.FIGMA_URL || "";
          const m = /figma\.com\/(?:file|design|board)\/([A-Za-z0-9]{10,})/.exec(url);
          if (!m) { console.error("::error::not a Figma file link: " + url); process.exit(1); }
          const key = m[1];
          const H = { "X-Figma-Token": process.env.FIGMA_TOKEN };
          const get = async (p) => {
            const r = await fetch("https://api.figma.com/v1" + p, { headers: H });
            if (!r.ok) { console.error("::error::figma " + p + " -> " + r.status); process.exit(1); }
            return r.json();
          };
          const hex = (c) => "#" + [c.r, c.g, c.b].map((v) => Math.round(Math.max(0, Math.min(1, v)) * 255).toString(16).padStart(2, "0")).join("").toUpperCase();
          const bump = (map, k, by = 1) => map.set(k, (map.get(k) || 0) + by);
          const top = (map, n) => [...map.entries()].sort((a, b) => b[1] - a[1]).slice(0, n);

          // FULL document — the deep dig. Big files: this is the point.
          const doc = await get("/files/" + key);
          const fills = new Map(), fillNames = new Map(), fonts = new Map(), radii = new Map(),
                gaps = new Map(), pads = new Map(), shadows = new Map(), motions = new Map(),
                strokes = new Map();
          let iconish = 0, gradients = 0, nodeCount = 0;
          const walk = (n, depth) => {
            if (!n || typeof n !== "object" || n.visible === false) return;
            nodeCount++;
            for (const f of n.fills || []) {
              if (f.visible === false) continue;
              if (f.type === "SOLID" && f.color && (f.opacity ?? 1) > 0.15) {
                const h = hex(f.color);
                bump(fills, h);
                if (n.name && n.name.length < 40) {
                  const arr = fillNames.get(h) || new Map();
                  bump(arr, n.name);
                  fillNames.set(h, arr);
                }
              } else if ((f.type || "").startsWith("GRADIENT")) gradients++;
            }
            for (const s of n.strokes || []) {
              if (s.type === "SOLID" && s.color) bump(strokes, hex(s.color));
            }
            if (n.type === "TEXT" && n.style?.fontFamily) {
              const st = n.style;
              bump(fonts, JSON.stringify({ family: st.fontFamily, size: st.fontSize ?? null, weight: st.fontWeight ?? null, lh: st.lineHeightPx ? Math.round(st.lineHeightPx) : null }));
            }
            if (typeof n.cornerRadius === "number" && n.cornerRadius > 0) bump(radii, Math.round(n.cornerRadius));
            if (n.layoutMode && n.layoutMode !== "NONE") {
              if (typeof n.itemSpacing === "number" && n.itemSpacing > 0) bump(gaps, Math.round(n.itemSpacing));
              for (const p of [n.paddingLeft, n.paddingTop]) if (typeof p === "number" && p > 0) bump(pads, Math.round(p));
            }
            for (const e of n.effects || []) {
              if (e.visible === false) continue;
              if (e.type === "DROP_SHADOW" || e.type === "INNER_SHADOW") {
                bump(shadows, JSON.stringify({ kind: e.type, x: Math.round(e.offset?.x ?? 0), y: Math.round(e.offset?.y ?? 0), blur: Math.round(e.radius ?? 0), color: e.color ? hex(e.color) : null, alpha: e.color ? Math.round((e.color.a ?? 1) * 100) / 100 : null }));
              }
            }
            if (typeof n.transitionDuration === "number" && n.transitionDuration > 0) {
              bump(motions, JSON.stringify({ ms: Math.round(n.transitionDuration), easing: n.transitionEasing ?? null }));
            }
            if (/\b(icon|glyph)\b/i.test(n.name || "") && depth > 1) iconish++;
            for (const ch of n.children || []) walk(ch, depth + 1);
          };
          walk(doc.document, 0);

          // component inventory: sets carry the VARIANT AXES (the real system)
          const sets = Object.values(doc.componentSets || {}).map((s) => s.name);
          const comps = Object.values(doc.components || {}).map((c2) => c2.name);
          const variantAxes = {};
          for (const c2 of comps) {
            // "State=Hover, Size=Large" style names under a set
            if (c2.includes("=")) for (const part of c2.split(",")) {
              const [k] = part.split("=");
              const kk = (k || "").trim();
              if (kk) variantAxes[kk] = (variantAxes[kk] || 0) + 1;
            }
          }

          const out = {
            version: 3, file: doc.name || key, url, scanned_nodes: nodeCount,
            colors: top(fills, 24).map(([h, n]) => ({ hex: h, uses: n, names: top(fillNames.get(h) || new Map(), 3).map(([k]) => k) })),
            strokes: top(strokes, 8).map(([h, n]) => ({ hex: h, uses: n })),
            text: top(fonts, 16).map(([k, n]) => ({ ...JSON.parse(k), uses: n })),
            radii: top(radii, 8).map(([v, n]) => ({ px: v, uses: n })),
            spacing: { gaps: top(gaps, 10).map(([v, n]) => ({ px: v, uses: n })), paddings: top(pads, 10).map(([v, n]) => ({ px: v, uses: n })) },
            shadows: top(shadows, 8).map(([k, n]) => ({ ...JSON.parse(k), uses: n })),
            motion: top(motions, 6).map(([k, n]) => ({ ...JSON.parse(k), uses: n })),
            components: { sets: sets.slice(0, 60), count: comps.length, variant_axes: variantAxes },
            gradients, icons_detected: iconish,
          };
          const fs = await import("fs");
          fs.mkdirSync(".brewing/branding", { recursive: true });
          fs.writeFileSync(".brewing/branding/figma-import.json", JSON.stringify(out, null, 2));
          const md = ["# Figma brand source — " + out.file, "(deep dig by dash-figma-import " + "v3" + " from " + url + "; " + nodeCount + " nodes)", "",
            "## Colors", ...out.colors.map((c2) => "- " + c2.hex + " (" + c2.uses + "x" + (c2.names.length ? "; on: " + c2.names.join(", ") : "") + ")"), "",
            "## Text matrix", ...out.text.map((t) => "- " + t.family + " " + (t.size ?? "?") + "px w" + (t.weight ?? "?") + (t.lh ? " lh" + t.lh : "") + " (" + t.uses + "x)"), "",
            "## Components", "sets: " + out.components.sets.length + " · variants: " + out.components.count + " · axes: " + JSON.stringify(out.components.variant_axes), ...out.components.sets.slice(0, 30).map((s) => "- " + s), "",
            "## Radii", ...out.radii.map((r) => "- " + r.px + "px (" + r.uses + "x)"), "",
            "## Spacing", "gaps: " + out.spacing.gaps.map((g) => g.px).join(", "), "paddings: " + out.spacing.paddings.map((g) => g.px).join(", "), "",
            "## Shadows", ...out.shadows.map((s) => "- " + s.kind + " " + s.x + "," + s.y + " blur " + s.blur + " " + (s.color ?? "") + (s.alpha != null ? " @" + s.alpha : "") + " (" + s.uses + "x)"), "",
            "## Motion", ...out.motion.map((mo) => "- " + mo.ms + "ms " + (mo.easing ?? "") + " (" + mo.uses + "x)"), ""].join("\n");
          fs.writeFileSync(".brewing/branding/figma-import.md", md);
          console.log("deep dig: " + nodeCount + " nodes → " + out.colors.length + " colors, " + out.text.length + " text styles, " + out.components.count + " component variants, " + out.shadows.length + " shadows, " + out.motion.length + " motion specs");
          SCRIPT
          node /tmp/figma-import.mjs
      - name: Commit the brand source
        run: |
          git config user.name "dash-figma-import"
          git config user.email "noreply@slowcook.dev"
          git add .brewing/branding/figma-import.json .brewing/branding/figma-import.md
          git diff --cached --quiet || git commit -m "brand source: Figma deep dig (dash-figma-import v3)"
          git push
